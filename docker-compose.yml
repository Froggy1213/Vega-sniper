services:
  # 🐘 База данных
  db:
    image: postgres:15-alpine
    container_name: sniffer_db
    restart: always
    environment:
      POSTGRES_USER: sniffer_admin
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: sniffer_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 🐇 Брокер сообщений
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sniffer_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 🤖 Наш Telegram-бот
  bot:
    build:
      context: ./bot
    container_name: sniffer_bot
    restart: always
    env_file:
      - .env
    environment:
      # Заменяем localhost на имена контейнеров для работы внутри докер-сети
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      DATABASE_URL: "postgresql+asyncpg://sniffer_admin:super_secret_password@db:5432/sniffer_db"
    depends_on:
      - db
      - rabbitmq

  # 🐹 Микросервис парсера Mercari
  scraper_mercari:
    build:
      context: ./scrapers/mercari
    container_name: sniffer_scraper_mercari
    restart: always
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    depends_on:
      - rabbitmq

volumes:
  postgres_data:
  rabbitmq_data: