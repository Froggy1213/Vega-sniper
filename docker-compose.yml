services:
  # 🐘 База данных
  db:
    image: postgres:15-alpine
    container_name: sniffer_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sniffer_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-sniffer_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 🐇 Брокер сообщений
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sniffer_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS must be set}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 🤖 Наш Telegram-бот
  bot:
    build:
      context: ./bot
    container_name: sniffer_bot
    restart: always
    env_file:
      - .env
    environment:
      # Контейнерные URL формируются из переменных окружения
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:?RABBITMQ_PASS must be set}@rabbitmq:5672/"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-sniffer_admin}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-sniffer_db}"
    depends_on:
      - db
      - rabbitmq

  # 🐹 Микросервис парсера Mercari
  scraper_mercari:
    build:
      context: ./scrapers/mercari
    container_name: sniffer_scraper_mercari
    restart: always
    env_file:
      - .env
    environment:
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:?RABBITMQ_PASS must be set}@rabbitmq:5672/"
      DATABASE_URL: "postgres://${POSTGRES_USER:-sniffer_admin}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-sniffer_db}"
    depends_on:
      - rabbitmq

volumes:
  postgres_data:
  rabbitmq_data: